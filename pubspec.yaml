name: calories_tracking
description: 'A new Flutter project.'
publish_to: 'none'
version: 0.1.0

environment:
    sdk: ^3.9.2

dependencies:
    flutter:
        sdk: flutter
    firebase_core: ^4.2.1
    firebase_auth: ^6.1.2
    cloud_firestore: ^6.1.0
    shared_preferences: ^2.5.3
    flutter_dotenv: ^6.0.0
    intl: ^0.20.2
    http: ^1.6.0
    fl_chart: ^1.1.1
    oauth1: ^2.1.0
    provider: ^6.1.2

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0
    flutter_launcher_icons: ^0.13.0

flutter_icons:
    android: true
    ios: true
    image_path: 'assets/icons/app_icon.png'

flutter:
    uses-material-design: true
    assets:
        - .env
        - assets/icons/
